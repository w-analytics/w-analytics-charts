<meta charset="UTF-8">

<title>VIX %K Model</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#ccc;font-family:'Segoe UI',Arial,sans-serif}
.header{display:flex;align-items:center;padding:16px 24px;border-bottom:1px solid #111}
.header img{height:44px;margin-right:20px}
.nav a{color:#888;text-decoration:none;text-transform:uppercase;font-size:.75rem;letter-spacing:1px;margin-right:18px}
.nav a:hover{color:#aaa}
.container{max-width:1200px;margin:0 auto;padding:20px 24px}
.label{font-size:.82rem;text-transform:uppercase;letter-spacing:1.5px;color:#666;margin-bottom:14px}
.zoom-btns{display:flex;gap:8px;margin-bottom:14px}
.zoom-btns button{background:#1a1a1a;border:1px solid #444;color:#999;padding:6px 16px;border-radius:4px;cursor:pointer;font-size:.78rem}
.zoom-btns button:hover{border-color:#666;color:#ccc}
.zoom-btns button.active{border-color:#7891b1;color:#7891b1}
.chart-box{border:1px solid #222;border-radius:6px;padding:12px;height:560px;position:relative}
.footer{text-align:center;padding:20px;color:#555;font-size:.75rem;border-top:1px solid #111;margin-top:24px}
.stats{color:#777;font-size:.78rem;margin-bottom:4px}
.stat-cards{display:flex;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.stat-card{background:#111;border:1px solid #222;border-radius:6px;padding:12px 18px;flex:1;min-width:140px}
.stat-card .sc-label{font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:#666;margin-bottom:4px}
.stat-card .sc-value{font-size:1.3rem;font-weight:600;color:#ddd}
</style>

        backgroundColor: 'rgba(220,60,55,0.1)',
        borderWidth: 1,
        borderDash: [4,4],
        pointRadius: 0,
        fill: '+1',
        tension: 0.1,
        order: 4
      },
      {
        label: 'Low Band',
        data: lowData,
        borderColor: 'rgba(60,150,255,0.85)',
        backgroundColor: 'rgba(60,150,255,0.1)',
        borderWidth: 1,
        borderDash: [4,4],
        pointRadius: 0,
        fill: false,
        tension: 0.1,
        order: 3
      },
      {
        label: '%K Projection',
        data: projData,
        borderColor: 'rgba(150,90,200,0.75)',
        borderWidth: 2,
        pointRadius: 0,
        fill: false,
        tension: 0.1,
        order: 2
      },
      {
        label: 'VIX Actual Open',
        data: actualData,
        borderColor: 'rgb(188,213,95)',
        borderWidth: 2.5,
        pointRadius: 0,
        fill: false,
        tension: 0,
        order: 1
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: {mode:'nearest',intersect:false},
    scales: {
      x: {
        type: 'time',
        time: {unit:'month',displayFormats:{month:'MMM-yy'}},
        ticks: {maxTicksLimit:14,color:'#999'},
        grid: {color:'rgba(255,255,255,0.05)',borderColor:'#333'},
        border: {color:'#333'}
      },
      y: {
        ticks: {color:'#999',callback:function(v){return v.toFixed(1)}},
        grid: {color:'rgba(255,255,255,0.05)',borderColor:'#333'},
        border: {color:'#333'},
        title: {display:true,text:'VIX Open',color:'#999'}
      }
    },
    plugins: {
      legend: {position:'top',align:'start',labels:{usePointStyle:true,color:'#ddd'}},
      tooltip: {
        backgroundColor:'rgba(20,20,20,0.95)',
        titleColor:'#ddd',
        bodyColor:'#ccc',
        callbacks: {
          label: function(ctx) {
            return ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(2);
          }
        }
      },
      zoom: {
        zoom: {wheel:{enabled:true},mode:'x'},
        pan: {enabled:true,mode:'x'}
      }
    }
  }
});

function setRange(years) {
  document.querySelectorAll('.zoom-btns button').forEach(b => b.classList.remove('active'));
  if (years === 0) {
    chart.resetZoom();
    document.getElementById('btnAll').classList.add('active');
    return;
  }
  const end = new Date(dates[dates.length - 1]);
  const start = new Date(end);
  start.setFullYear(start.getFullYear() - years);
  chart.zoomScale('x', {min: start.getTime(), max: end.getTime()});
  document.getElementById('btn' + years + 'y').classList.add('active');
}
function resetZoom() {
  chart.resetZoom();
  document.querySelectorAll('.zoom-btns button').forEach(b => b.classList.remove('active'));
  document.getElementById('btnAll').classList.add('active');
}
</script>
