<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W Analytics - VIX %K Model</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#ccc;font-family:'Segoe UI',Arial,sans-serif;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;border-bottom:1px solid #222}
.header img{height:38px}
.nav a{color:#999;text-decoration:none;margin-left:24px;font-size:14px;transition:color .2s}
.nav a:hover{color:#bcd55f}
.main{max-width:1400px;margin:0 auto;padding:24px 32px}
h1{color:#eee;font-size:22px;font-weight:600;margin-bottom:6px}
.subtitle{color:#666;font-size:13px;margin-bottom:20px}
.stats{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.stat-card{background:#111;border:1px solid #222;border-radius:8px;padding:14px 20px;min-width:180px;flex:1}
.stat-label{color:#999;font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.stat-value{font-size:24px;font-weight:700}
.zoom-controls{display:flex;gap:8px;margin-bottom:14px}
.zoom-btn{background:#111;border:1px solid #333;color:#ccc;padding:6px 16px;border-radius:4px;cursor:pointer;font-size:13px;transition:all .2s}
.zoom-btn:hover{background:#222;border-color:#555}
.chart-container{background:#111;border:1px solid #222;border-radius:8px;padding:16px;position:relative}
canvas{width:100%!important}
.footer{text-align:center;padding:20px;color:#444;font-size:12px;margin-top:20px;border-top:1px solid #111}
</style>
</head>

function zoomTo(years){
if(years===0){chart.resetZoom();return;}
const now=new Date();
const start=new Date(now);
start.setFullYear(start.getFullYear()-years);
const startStr=start.toISOString().slice(0,10);
const endIdx=dates.length-1;
let startIdx=0;
for(let i=0;i<dates.length;i++){if(dates[i]>=startStr){startIdx=i;break;}}
chart.zoomScale('x',{min:startIdx,max:endIdx});
}
