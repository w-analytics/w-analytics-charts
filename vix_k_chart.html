<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: #ccc; font-family: 'Segoe UI', Arial, sans-serif; }
.header { display: flex; justify-content: space-between; align-items: center; padding: 18px 32px 10px 32px; }
.logo-area { display: flex; align-items: center; gap: 14px; }
.logo-area img { height: 38px; }
nav a { color: #999; text-decoration: none; margin-left: 22px; font-size: 0.95rem; transition: color 0.2s; }
nav a:hover { color: #bcd55f; }
.stats { display: flex; gap: 18px; padding: 8px 32px 12px 32px; flex-wrap: wrap; }
.stat-card { background: #111; border-radius: 10px; padding: 14px 22px; min-width: 180px; flex: 1; }
.stat-card .label { font-size: 0.82rem; color: #999; margin-bottom: 4px; }
.stat-card .value { font-size: 1.35rem; font-weight: 600; }
.chart-controls { padding: 6px 32px 8px 32px; display: flex; gap: 8px; }
.chart-controls button { background: #222; color: #ccc; border: 1px solid #333; border-radius: 6px; padding: 6px 16px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
.chart-controls button:hover { background: #333; color: #fff; }
.chart-container { padding: 0 24px 10px 24px; height: calc(100vh - 260px); min-height: 400px; }
.footer { text-align: center; padding: 12px; color: #666; font-size: 0.78rem; }
</style>
