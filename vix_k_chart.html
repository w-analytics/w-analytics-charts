<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; color:#ccc; font-family:'Segoe UI',Arial,sans-serif; }
.header { display:flex; align-items:center; justify-content:space-between; padding:18px 32px 10px 32px; }
.logo { height:48px; }
nav a { color:#999; text-decoration:none; margin-left:24px; font-size:0.95rem; transition:color 0.2s; }
nav a:hover { color:#bcd55f; }
.title-row { text-align:center; padding:0 0 10px 0; }
.title-row h1 { color:#ccc; font-size:1.45rem; font-weight:400; letter-spacing:1px; }
.stat-cards { display:flex; justify-content:center; gap:18px; padding:0 32px 14px 32px; flex-wrap:wrap; }
.stat-card { background:#111; border-radius:10px; padding:14px 28px; min-width:170px; text-align:center; }
.stat-card .label { color:#999; font-size:0.78rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
.stat-card .value { font-size:1.55rem; font-weight:600; }
.chart-container { padding:0 24px; position:relative; }
canvas { background:#000; }
.zoom-btns { text-align:center; padding:12px 0 4px 0; }
.zoom-btns button { background:#222; color:#ccc; border:1px solid #333; border-radius:6px; padding:6px 18px; margin:0 4px; cursor:pointer; font-size:0.85rem; transition:background 0.2s; }
.zoom-btns button:hover { background:#333; }
.footer { text-align:center; padding:18px 0 24px 0; color:#666; font-size:0.78rem; }
</style>

function zoomTo(days) {
  if (days === 0) {
    chart.resetZoom();
    return;
  }
  const end = dates.length - 1;
  let start = 0;
  const endDate = new Date(dates[end]);
  for (let i = end; i >= 0; i--) {
    const d = new Date(dates[i]);
    if ((endDate - d) / 86400000 >= days) { start = i; break; }
  }
  chart.zoomScale('x', { min: dates[start], max: dates[end] });
}
function resetZoom() { chart.resetZoom(); }
