<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W Analytics - VIX %K Charting Model</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-zoom/2.0.1/chartjs-plugin-zoom.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#ccc;font-family:'Segoe UI',Arial,sans-serif;min-height:100vh}
.navbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:#111;border-bottom:1px solid #222}
.navbar img{height:40px}
.nav-links{display:flex;gap:20px}
.nav-links a{color:#999;text-decoration:none;font-size:14px;transition:color 0.2s}
.nav-links a:hover{color:#bcd55f}
.container{max-width:1400px;margin:0 auto;padding:20px}
h1{color:#ccc;font-size:22px;margin:16px 0;text-align:center;font-weight:400}
.stats{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin:16px 0}
.stat-card{background:#111;border-radius:8px;padding:16px 24px;min-width:180px;text-align:center;border:1px solid #222}
.stat-label{color:#999;font-size:12px;text-transform:uppercase;margin-bottom:6px;letter-spacing:1px}
.stat-value{font-size:24px;font-weight:600}
.chart-container{background:#111;border-radius:8px;padding:16px;margin:16px 0;border:1px solid #222;position:relative}
.zoom-buttons{display:flex;gap:8px;justify-content:center;margin:12px 0}
.zoom-btn{background:#222;color:#ccc;border:1px solid #333;border-radius:4px;padding:6px 16px;cursor:pointer;font-size:13px;transition:all 0.2s}
.zoom-btn:hover{background:#333;color:#fff}
.zoom-btn.active{background:#444;color:#bcd55f;border-color:#bcd55f}
.footer{text-align:center;padding:20px;color:#666;font-size:12px;border-top:1px solid #222;margin-top:24px}
canvas{width:100%!important}
</style>
</head>
