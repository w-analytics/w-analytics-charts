<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIX %K Charting Model - W Analytics</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: #ccc; font-family: 'Segoe UI', Arial, sans-serif; min-height: 100vh; }
.header { display: flex; align-items: center; justify-content: space-between; padding: 18px 32px; border-bottom: 1px solid #222; }
.logo-area { display: flex; align-items: center; gap: 12px; }
.logo-area img { height: 38px; }
nav a { color: #999; text-decoration: none; margin-left: 22px; font-size: 0.95rem; transition: color 0.2s; }
nav a:hover { color: #bcd55f; }
.container { max-width: 1400px; margin: 0 auto; padding: 24px 32px; }
.stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
.stat-card { background: #111; border: 1px solid #222; border-radius: 10px; padding: 18px 20px; }
.stat-card .label { font-size: 0.82rem; color: #999; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-card .value { font-size: 1.7rem; font-weight: 600; }
.chart-container { background: #111; border: 1px solid #222; border-radius: 10px; padding: 20px; }
.zoom-buttons { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.zoom-btn { background: #222; color: #ccc; border: 1px solid #333; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
.zoom-btn:hover { background: #333; color: #fff; }
.footer { text-align: center; padding: 24px; color: #666; font-size: 0.8rem; border-top: 1px solid #222; margin-top: 32px; }
</style>
