<title>%K Anomaly Detection - DJIA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#ccc;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column}
.header{display:flex;align-items:center;padding:16px 24px;border-bottom:1px solid #1a1a1a}
.header img{height:44px;margin-right:20px}
.nav a{color:#888;text-decoration:none;text-transform:uppercase;font-size:.75rem;letter-spacing:1px;margin:0 12px;transition:color .2s}
.nav a:hover{color:#7891b1}
.label-row{padding:10px 24px;display:flex;align-items:center;justify-content:space-between}
.chart-label{font-size:.82rem;text-transform:uppercase;letter-spacing:1.5px;color:#666}
.zoom-buttons{display:flex;gap:6px}
.zoom-buttons button{background:#1a1a1a;border:1px solid #444;color:#aaa;padding:5px 14px;font-size:.75rem;cursor:pointer;border-radius:3px;transition:all .2s}
.zoom-buttons button:hover,.zoom-buttons button.active{background:#7891b1;color:#fff;border-color:#7891b1}
.chart-wrap{flex:1;padding:0 24px 10px;position:relative}
.chart-container{border:1px solid #222;border-radius:4px;padding:10px;height:560px;position:relative}
.footer{padding:12px 24px;border-top:1px solid #1a1a1a;display:flex;justify-content:space-between;font-size:.72rem;color:#666;flex-wrap:wrap;gap:8px}
.footer .stats span{margin-right:16px}
</style>
