<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>%K Anomaly Detection — W Analytics</title>
<style>
  html, body { margin:0; padding:0; background:#000; color:#ddd; font-family: Arial, Helvetica, sans-serif; }
  a { color: inherit; text-decoration: none; }
  header { display:flex; align-items:center; justify-content:space-between; padding: 14px 28px; border-bottom:1px solid #222; }
  header .brand img { height:44px; display:block; }
  header nav a { color:#888; text-transform:uppercase; font-size:.75rem; letter-spacing:1.2px; margin-left:24px; }
  header nav a:hover { color:#ddd; }
  main { padding: 24px 28px; }
  .label { font-size:.82rem; text-transform:uppercase; letter-spacing:1.5px; color:#666; margin-bottom:12px; }
  .controls { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
  .controls button {
    background:#1a1a1a; color:#ddd; border:1px solid #444; padding:6px 14px;
    font-size:.78rem; letter-spacing:1px; text-transform:uppercase; cursor:pointer;
    border-radius:2px;
  }
  .controls button:hover { border-color:#7891b1; }
  .controls button.active { background:#7891b1; color:#000; border-color:#7891b1; }
  .chart-wrap { border:1px solid #222; height:560px; padding:8px; }
  footer { padding: 16px 28px; border-top:1px solid #222; color:#666; font-size:.75rem; display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; }
</style>

function setRange(years) {
  document.querySelectorAll('.controls button[data-range]').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector('.controls button[data-range="' + years + '"]');
  if (btn) btn.classList.add('active');
  if (years === 'all') {
    chart.resetZoom();
    return;
  }
  const allDates = djiaData.map(d => new Date(d.x).getTime());
  const max = Math.max.apply(null, allDates);
  const min = max - (years * 365.25 * 24 * 3600 * 1000);
  chart.zoomScale('x', { min: min, max: max }, 'default');
}

function resetZoom() {
  document.querySelectorAll('.controls button[data-range]').forEach(b => b.classList.remove('active'));
  chart.resetZoom();
}
