<title>Kellan DJIA %K Model</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
.header { display: flex; align-items: center; justify-content: space-between; padding: 15px 30px; border-bottom: 1px solid #1a1a1a; }
.logo-area { display: flex; align-items: center; gap: 12px; }
.logo-area img { height: 40px; }
.nav-links { display: flex; gap: 20px; }
.nav-links a { color: #888; text-decoration: none; font-size: 14px; transition: color 0.2s; }
.nav-links a:hover { color: #e0e0e0; }
.title { text-align: center; padding: 20px 0 10px; font-size: 24px; font-weight: 600; color: #e0e0e0; }
.stats { display: flex; justify-content: center; gap: 20px; padding: 10px 30px 20px; flex-wrap: wrap; }
.stat-card { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 8px; padding: 15px 25px; text-align: center; min-width: 180px; }
.stat-card .label { font-size: 12px; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
.stat-card .value { font-size: 22px; font-weight: 700; }
.zoom-controls { display: flex; justify-content: center; gap: 8px; padding: 0 30px 15px; }
.zoom-controls button { background: #1a1a1a; color: #aaa; border: 1px solid #333; border-radius: 4px; padding: 6px 14px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
.zoom-controls button:hover { background: #333; color: #fff; }
.chart-container { padding: 0 20px 20px; height: 60vh; }
.footer { text-align: center; padding: 20px; color: #555; font-size: 12px; border-top: 1px solid #1a1a1a; }
</style>
