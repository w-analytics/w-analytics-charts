* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
.header { display: flex; align-items: center; justify-content: space-between; padding: 15px 30px; border-bottom: 1px solid #1a1a1a; }
.logo-area { display: flex; align-items: center; gap: 12px; }
.logo-area img { height: 40px; }
.nav-links { display: flex; gap: 25px; }
.nav-links a { color: #888; text-decoration: none; font-size: 14px; transition: color 0.2s; }
.nav-links a:hover { color: #bcd55f; }
.title { text-align: center; padding: 25px 0 10px; }
.title h1 { font-size: 28px; font-weight: 300; color: #e0e0e0; letter-spacing: 1px; }
.stats { display: flex; justify-content: center; gap: 20px; padding: 15px 30px; flex-wrap: wrap; }
.stat-card { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 10px; padding: 15px 25px; min-width: 200px; text-align: center; }
.stat-card .label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
.stat-card .value { font-size: 24px; font-weight: 600; }
.zoom-controls { text-align: center; padding: 15px 0; }
.zoom-controls button { background: #1a1a1a; color: #888; border: 1px solid #333; border-radius: 5px; padding: 6px 16px; margin: 0 4px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
.zoom-controls button:hover { background: #333; color: #e0e0e0; }
.chart-container { padding: 10px 30px 20px; position: relative; height: 500px; }
.footer { text-align: center; padding: 20px; color: #555; font-size: 12px; border-top: 1px solid #1a1a1a; margin-top: 20px; }

}
