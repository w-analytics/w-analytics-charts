<title>Kellan DJIA %K Model</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif}
.header{display:flex;align-items:center;justify-content:space-between;padding:18px 32px 10px;border-bottom:1px solid #181818}
.header-left{display:flex;align-items:center;gap:16px}
.logo{height:38px}
.nav{display:flex;gap:22px}
.nav a{color:#aaa;text-decoration:none;font-size:14px;transition:color .2s}.nav a:hover{color:#fff}
.title{text-align:center;padding:22px 0 8px;font-size:26px;font-weight:600;letter-spacing:1px;color:#e8e8e8}
.stats{display:flex;justify-content:center;gap:18px;padding:10px 20px 18px;flex-wrap:wrap}
.stat-card{background:#111;border:1px solid #222;border-radius:10px;padding:14px 28px;min-width:170px;text-align:center}
.stat-label{font-size:12px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:22px;font-weight:700}
.zoom-btns{display:flex;justify-content:center;gap:8px;padding:0 0 12px}
.zoom-btns button{background:#181818;color:#ccc;border:1px solid #333;border-radius:6px;padding:6px 16px;cursor:pointer;font-size:13px;transition:all .2s}
.zoom-btns button:hover{background:#252525;color:#fff}
.chart-container{padding:0 24px;position:relative;height:55vh;min-height:380px}
.footer{text-align:center;padding:20px;color:#555;font-size:12px;border-top:1px solid #111;margin-top:20px}
</style>
