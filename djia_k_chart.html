<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#ccc;font-family:'Segoe UI',Arial,sans-serif;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid #222}
.logo-area{display:flex;align-items:center;gap:12px}
.logo-area img{height:40px}
nav a{color:#999;text-decoration:none;margin-left:20px;font-size:14px;transition:color .2s}
nav a:hover{color:#bcd55f}
.page-title{padding:20px 24px 0;font-size:22px;font-weight:600;color:#ddd;letter-spacing:.5px}
.stat-cards{display:flex;gap:16px;padding:20px 24px;flex-wrap:wrap}
.stat-card{background:#111;border:1px solid #222;border-radius:8px;padding:16px 20px;flex:1;min-width:180px}
.stat-card .label{font-size:12px;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.stat-card .value{font-size:28px;font-weight:600}
.chart-container{padding:0 24px 20px;position:relative}
.zoom-buttons{display:flex;gap:8px;padding:0 24px 16px}
.zoom-btn{background:#111;color:#ccc;border:1px solid #333;border-radius:4px;padding:6px 14px;cursor:pointer;font-size:13px;transition:all .2s}
.zoom-btn:hover{background:#222;border-color:#555}
.footer{text-align:center;padding:20px;color:#666;font-size:12px;border-top:1px solid #222;margin-top:20px}
</style>
